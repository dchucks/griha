{{ define "main" }}
<section class="section page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
    <p>{{ .Content }}</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="grid grid-3">
      {{ range .Pages.ByWeight }}
      <a href="{{ .RelPermalink }}" class="card service-card">
        {{ if .Params.icon }}<div class="card-icon">{{ .Params.icon }}</div>{{ end }}
        <h3>{{ .Title }}</h3>
        <p>{{ .Params.summary | default .Summary }}</p>
        <span class="card-link">Learn more →</span>
      </a>
      {{ end }}
    </div>
    <div class="section-cta">
      <a href="{{ .Site.Params.topmate }}" class="btn btn-primary" target="_blank" rel="noopener">Book a Session on Topmate</a>
    </div>
  </div>
</section>
{{ end }}
