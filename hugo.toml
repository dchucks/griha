baseURL = "https://example.com/"
languageCode = "en-us"
title = "Your Name"

[params]
  name = "Your Name"
  tagline = "Technical Program Manager · Author · Speaker"
  shortBio = "I help teams ship complex programs on time, write books on tech leadership, and coach professionals through 1:1 mentoring."
  email = "hello@example.com"
  resumeFile = "/files/resume.pdf"
  headshot = "/images/headshot/profile.jpg"
  footerImage = "/images/footer-bg.jpg"
  heroImage = "/images/hero-image.jpg"

  # Social links
  linkedin = "https://linkedin.com/in/yourname"
  twitter = "https://twitter.com/yourname"
  github = "https://github.com/yourname"
  topmate = "https://topmate.io/yourname"
  youtube = "https://youtube.com/@Dhwanilok"
  fiverr = "https://fiverr.com/yourname"
  voicesDotCom = "https://voices.com/yourname"

  # Google Analytics 4 - set your Measurement ID (e.g. G-XXXXXXXXXX). Leave empty to disable.
  googleAnalyticsID = ""

  # Google Search Console verification meta tag content (the value of the "content" attribute)
  googleSiteVerification = ""

[params.newsletter]
  # Substack publication subdomain used for embed forms, e.g. "yourname" -> https://yourname.substack.com
  substackHandle = "yourname"

